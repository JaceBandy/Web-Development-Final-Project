<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="bg-primary text-white p-3 mb-4">
    <div class="container">
        <h1 id="main-title">Events</h1>
    </div>
</header>

<main class="container">
    <!-- Search bar with button -->
    <div class="mb-3" role="search">
    <label for="search" class="form-label visually-hidden">Search events</label>
    <input type="text" id="search" class="form-control d-inline w-50 me-2" placeholder="Search events..." aria-label="Search events">

    <label for="location" class="form-label visually-hidden">Your location</label>
    <input type="text" id="location" class="form-control d-inline w-25 me-2" placeholder="City or ZIP" aria-label="Location">

    <button id="searchBtn" class="btn btn-primary d-inline" aria-label="Search Button">Search</button>
</div>

    <!-- Events container -->
    <div id="events-container" class="row" role="list"></div>
</main>

<footer class="bg-light text-center p-3 mt-4">
    <p>&copy; 2026 Campus Life Super App</p>
</footer>

<script src="js/events.js"></script>
</body>
</html>
